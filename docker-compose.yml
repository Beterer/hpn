name: hpn

# Local dev infrastructure (backbone §13.1). The .NET host and the Vite dev
# server run on the host machine for fast hot-reload; this file brings up the
# backing services they talk to. A prod-profile compose containerizes the apps
# too (added later).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hpn
      POSTGRES_PASSWORD: hpn
      POSTGRES_DB: hpn
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpn -d hpn"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hpn
      MINIO_ROOT_PASSWORD: hpn-secret
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  # One-shot: create the photos bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 hpn hpn-secret; do
          echo 'waiting for minio...'; sleep 1;
        done
        mc mb --ignore-existing local/hpn-photos
        mc anonymous set none local/hpn-photos
        echo 'minio bucket ready'

  # Catches magic-link emails locally — no real email provider needed in dev.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "11025:1025"
      - "18025:8025"
    environment:
      MP_MAX_MESSAGES: 5000

  # Reverse proxy: TLS termination + static PWA in prod; in dev it fronts the
  # host-run API and Vite dev server so the whole stack is reachable on one port.
  proxy:
    image: caddy:2-alpine
    depends_on:
      - postgres
    ports:
      - "18080:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  minio-data:
